<html>

<body>
  <script>
    async function main() {
      const stream = await navigator.mediaDevices.getUserMedia({video: true});
      console.error(stream);

      const videoTrack = stream.getVideoTracks()[0];
      console.error(videoTrack);

      const trackProcessor = new MediaStreamTrackProcessor({track: videoTrack});
      const reader = trackProcessor.readable.getReader();
      let lastPts = 0;
      let frames = [null, null];
      let i = 0;
      setInterval(async () => {
        const {done, value: videoFrame} = await reader.read();
        if (done) {
          return;
        }

        console.warn(`Elapsed ${(videoFrame.timestamp - lastPts) / 1000}`);
        lastPts = videoFrame.timestamp;
        frames[i % 2] = videoFrame;
        if (frames[(i + 1) % 2]) {
          frames[(i + 1) % 2].close();
        }
        i++;
      }, 100)
      // while (true) {
      // }
    }

    main();
  </script>
</body>

</html>
